<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Sport</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="header-title">Analyse Sport</div>
    <div class="header-subtitle">Analyse avancée · IA intégrée · Temps réel</div>
</div>

<div class="page">

    <div class="section-title">En ce moment</div>

    <div class="live-cards">
        <div class="live-card">
            <div class="live-sport">Football — Ligue 1</div>
            <div class="live-score">
                <span>PSG</span>
                <strong>2 – 1</strong>
                <span>Lyon</span>
            </div>
        </div>
        <div class="live-card">
            <div class="live-sport">Tennis — ATP Monte Carlo</div>
            <div class="live-score">
                <span>Sinner</span>
                <strong>6-4 3-</strong>
                <span>Alcaraz</span>
            </div>
        </div>
        <div class="live-card">
            <div class="live-sport">NBA</div>
            <div class="live-score">
                <span>Lakers</span>
                <strong>89 – 94</strong>
                <span>Celtics</span>
            </div>
        </div>
    </div>

    <div class="section-title">Sports</div>

    <div class="sports-grid">
        <a href="football.html" class="sport-card">
            <div class="sport-icon">⚽</div>
            <div class="sport-name">Football</div>
            <div class="sport-count">12 matchs</div>
        </a>
        <a href="#" class="sport-card">
            <div class="sport-icon">🎾</div>
            <div class="sport-name">Tennis</div>
            <div class="sport-count">8 matchs</div>
        </a>
        <a href="#" class="sport-card">
            <div class="sport-icon">🏀</div>
            <div class="sport-name">Basket-ball</div>
            <div class="sport-count">6 matchs</div>
        </a>
        <a href="#" class="sport-card">
            <div class="sport-icon">🏒</div>
            <div class="sport-name">Hockey</div>
            <div class="sport-count">4 matchs</div>
        </a>
    </div>

</div>
</body>
</html>
